name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readme:
    name: README walkthrough (Arch)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 180

    steps:
      - name: Refresh keyring & system
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --disable-download-timeout

      - name: Install sudo & git, create builder user
        run: |
          pacman -S --noconfirm --needed sudo git
          useradd -m -G wheel -s /bin/bash builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >/etc/sudoers.d/builder

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Base — pacman packages
        # systemctl enable --now {dhcpcd,iwd,cronie,ufw} from the README is skipped:
        # the arch container has no running systemd to accept unit state changes.
        # `ufw default …` policy commands only edit /etc/default/ufw, so they
        # work fine without a kernel netfilter or a running service.
        run: |
          pacman -S --noconfirm --needed \
            base base-devel linux linux-firmware dhcpcd iwd curl unzip zsh vim \
            xorg xorg-xinit i3 dex ttf-dejavu man-pages man-db dmenu polkit \
            xdg-utils nodejs npm rustup python git rsync fasd fzf tmux \
            zsh-syntax-highlighting openssh keychain pass pinentry ruby btop \
            terminator cronie zsh-autosuggestions nmap ufw zsh-completions
          ufw default deny incoming
          ufw default allow outgoing

      - name: Base — clone + install.sh + chsh
        # The wttr-fetch crontab entry only edits /var/spool/cron/<user>; it
        # works in the container even though cronie.service isn't running,
        # which lets us exercise the README command without a real scheduler.
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          sudo -u builder bash -euc '
            src=$1
            cp -a "$src" "$HOME/.dotfiles"
            "$HOME/.dotfiles/install.sh"
            test -f "$HOME/.zshrc"
            test -d "$HOME/.zsh/pure"
            test -x "$HOME/.bin/dotfiles-resolve"
            { crontab -l 2>/dev/null | grep -vF "wttr-fetch" || true ; echo "*/15 * * * * $HOME/.config/i3status/wttr-fetch" ; } | crontab -
            crontab -l | grep -qF "wttr-fetch"
          ' _ "$GITHUB_WORKSPACE"
          usermod -s /usr/bin/zsh builder

      - name: Extras — nvm, Node, global npm packages
        run: |
          sudo -u builder bash -euc '
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"
            nvm install lts/krypton
            npm install --global yarn lerna npm serve pm2
          '

      - name: Extras — official packages
        run: |
          pacman -S --noconfirm --needed \
            mtr dysk fastfetch github-cli asciiquarium cmatrix sl

      - name: Extras — pikaur + AUR packages
        run: |
          sudo -u builder bash -euc '
            rustup default stable
            cd "$(mktemp -d)"
            git clone https://aur.archlinux.org/pikaur.git
            cd pikaur
            makepkg -fsri --noconfirm
            pikaur -S --noconfirm --needed claude-code pipes.sh lsu-git psn-git
          '

      - name: Extras — patched pass-secret-service-git
        # Temporary until https://github.com/grimsteel/pass-secret-service/pull/24
        # merges and the AUR package rebuilds against a grimsteel/main that
        # contains the fix. When that happens, delete this step and add
        # `pass-secret-service-git` back onto the pikaur -S line above.
        run: |
          sudo -u builder bash -euc '
            sudo pacman -Rdd --noconfirm pass-secret-service 2>/dev/null || true
            cd "$(mktemp -d)"
            git clone https://aur.archlinux.org/pass-secret-service-git.git
            cd pass-secret-service-git
            curl -fsSLo pr24.patch https://patch-diff.githubusercontent.com/raw/grimsteel/pass-secret-service/pull/24.patch
            cat >>PKGBUILD <<"EOF"

          # Temporary override to apply grimsteel/pass-secret-service#24 before build.
          prepare() {
            export CARGO_HOME="${srcdir}/.cargo"
            cd "${srcdir}/${_pkgname}"
            patch -p1 < "${startdir}/pr24.patch"
            cargo fetch
            git log > "${srcdir}/git.log"
          }
          EOF
            makepkg -si --noconfirm
          '

      - name: Desktop — official packages
        # systemctl enable --now bluetooth and the `--user` pipewire/syncthing lines
        # are skipped for the same reason as the Base section.
        run: |
          pacman -S --noconfirm --needed \
            syncthing hplip cups cups-pdf brightnessctl bluez bluez-utils \
            pipewire pipewire-alsa pipewire-pulse pipewire-jack wireplumber \
            alsa-utils ranger ttf-fira-code noto-fonts noto-fonts-emoji \
            papirus-icon-theme scrot okular shotwell caja engrampa meld code \
            obsidian signal-desktop element-desktop speedcrunch firefox \
            thunderbird protonmail-bridge eom libreoffice-fresh vlc pavucontrol \
            pasystray krita xdg-desktop-portal xdg-desktop-portal-gtk

      - name: Desktop — AUR packages
        # i3lock ships as part of the `i3` group in Base; remove it so pikaur can
        # install i3lock-color without the interactive conflict prompt that
        # `--noconfirm` defaults to No.
        run: |
          sudo -u builder bash -euc '
            sudo pacman -Rdd --noconfirm i3lock
            pikaur -S --noconfirm --needed \
              i3lock-color xidlehook xrandr-invert-colors brave-bin \
              enpass-bin sublime-text-4 pinta
          '

      - name: SSH-Keys
        # Mirrors README verbatim. `-N ""` is now in both places (the key is
        # deliberately passphrase-less — see README SSH-Keys prose + CLAUDE.md
        # rationale). `-f ~/.ssh/id_ed25519` is the only CI-only bit: skips
        # the interactive file-path prompt, since the container has no TTY.
        # $HOST defaults to "ci" here (the Arch container has no HOST env set).
        run: |
          sudo -u builder bash -euc '
            HOST=ci
            chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
            ssh-keygen -t ed25519 -N "" -C "$USER@$HOST-$(date +%F)" -f ~/.ssh/id_ed25519
          '

      - name: Proton Mail — GPG key + pass init
        # Mirrors the README block. Divergences:
        #  - `protonmail-bridge-core --cli` is an interactive network login,
        #    swapped for `command -v` so we only check the prerequisite
        #    binary landed.
        #  - `systemctl --user restart pass-secret-service` and
        #    `systemctl --user enable --now protonmail-bridge` are dropped
        #    for the same no-systemd-in-container reason as Base/Desktop.
        # Fingerprint comes from gpg's own --status-file (KEY_CREATED line),
        # never from `gpg --list-secret-keys` — the README spec explicitly
        # forbids a list-based guard so the generated key is always the pass
        # recipient regardless of what other keys exist on the machine.
        run: |
          sudo -u builder bash -euc '
            mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
            gen_status=$(mktemp)
            gpg --batch --generate-key --status-file "$gen_status" <<EOF
          %no-protection
          Key-Type: EDDSA
          Key-Curve: ed25519
          Subkey-Type: ECDH
          Subkey-Curve: cv25519
          Name-Real: pass
          Name-Email: pass@${HOSTNAME:-ci}
          Expire-Date: 0
          %commit
          EOF
            fpr=$(awk "/^\[GNUPG:\] KEY_CREATED/ {print \$4; exit}" "$gen_status")
            rm -f "$gen_status"
            pass init "$fpr"
            pass ls >/dev/null
            command -v protonmail-bridge-core
          '

      - name: Smoke-test .zshrc under a fresh zsh
        run: |
          sudo -u builder zsh -c 'source "$HOME/.zshrc" && echo zshrc-ok'
